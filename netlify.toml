[build]
  command = "pnpm build"
  publish = "apps/web/.next"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# CSP should be tightened during implementation.
# WebLLM, workers, WASM, blob URLs and model downloads may require specific directives.
